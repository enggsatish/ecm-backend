{
  "vhosts": [{ "name": "ecm" }],
  "exchanges": [
    {
      "name": "ecm.documents",
      "vhost": "ecm",
      "type": "topic",
      "durable": true,
      "auto_delete": false
    },
    {
      "name": "ecm.workflow",
      "vhost": "ecm",
      "type": "topic",
      "durable": true,
      "auto_delete": false
    },
    {
      "name": "ecm.deadletter",
      "vhost": "ecm",
      "type": "direct",
      "durable": true,
      "auto_delete": false
    }
  ],
  "queues": [
    {
      "name": "ocr.requests",
      "vhost": "ecm",
      "durable": true,
      "arguments": {
        "x-dead-letter-exchange": "ecm.deadletter",
        "x-dead-letter-routing-key": "ocr.dead",
        "x-message-ttl": 3600000
      }
    },
    {
      "name": "ocr.results",
      "vhost": "ecm",
      "durable": true,
      "arguments": {}
    },
    {
      "name": "notification.events",
      "vhost": "ecm",
      "durable": true,
      "arguments": {}
    },
    {
      "name": "workflow.events",
      "vhost": "ecm",
      "durable": true,
      "arguments": {}
    },
    {
      "name": "retention.jobs",
      "vhost": "ecm",
      "durable": true,
      "arguments": {}
    },
    {
      "name": "ocr.dead",
      "vhost": "ecm",
      "durable": true,
      "arguments": {}
    }
  ],
  "bindings": [
    {
      "source": "ecm.documents",
      "vhost": "ecm",
      "destination": "ocr.requests",
      "destination_type": "queue",
      "routing_key": "document.uploaded"
    },
    {
      "source": "ecm.documents",
      "vhost": "ecm",
      "destination": "notification.events",
      "destination_type": "queue",
      "routing_key": "document.*"
    },
    {
      "source": "ecm.workflow",
      "vhost": "ecm",
      "destination": "notification.events",
      "destination_type": "queue",
      "routing_key": "workflow.*"
    }
  ],
  "users": [{
    "name": "ecmrabbit",
    "password": "ecmrabbitpassword",
    "tags": "administrator"
  }],
  "permissions": [{
    "user": "ecmrabbit",
    "vhost": "ecm",
    "configure": ".*",
    "write": ".*",
    "read": ".*"
  }]
}