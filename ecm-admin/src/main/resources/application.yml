spring:
  application:
    name: ecm-admin

  datasource:
    url: jdbc:postgresql://localhost:5432/ecmdb
    username: ecmuser
    password: ecmpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AdminServicePool
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ecm_admin
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    schemas: ecm_admin
    baseline-on-migrate: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:missing"

  rabbitmq:
    host: localhost
    port: 5672
    username: ecmrabbit
    password: ecmrabbitpassword
    virtual-host: ecm

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://integrator-3023444.okta.com/oauth2/ausykohz3k9z4e9Wy697

server:
  port: 8086

okta:
  oauth2:
    audience: api://sso-default

ecm:
  master-encrypt-key: ${MASTER_ENCRYPT_KEY:b5+BMrlFk333DFKoF2Sl1GJpeRc6KbfHcv1rp9WC9gY=}
  security:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  services:
    workflow-url: ${WORKFLOW_URL:http://localhost:8083}
  internal:
    api-key: ${INTERNAL_API_KEY:ecm-internal-dev-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.ecm.admin: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

---
spring:
  config:
    activate:
      on-profile: azure
  datasource:
    url: ${AZURE_DB_URL}
    username: ${AZURE_DB_USER}
    password: ${AZURE_DB_PASS}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OKTA_ISSUER_URI}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    virtual-host: ${RABBITMQ_VHOST:ecm}
okta:
  oauth2:
    audience: ${OKTA_AUDIENCE}
ecm:
  security:
    allowed-origins: ${CORS_ORIGINS}
  services:
    workflow-url: ${WORKFLOW_URL}
  internal:
    api-key: ${INTERNAL_API_KEY}
