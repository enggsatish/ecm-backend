version: '3.9'

services:

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecm-postgres
    environment:
      POSTGRES_DB: ecmdb
      POSTGRES_USER: ecmuser
      POSTGRES_PASSWORD: ecmpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecmuser -d ecmdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecm-network

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecm-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ecmredispassword
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ecmredispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecm-network

  # ─── MinIO ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ecm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ecmminioadmin
      MINIO_ROOT_PASSWORD: ecmminio@password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecm-network

  # ─── MinIO bucket setup ───────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: ecm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 ecmminioadmin 'ecmminio@password123';
        mc mb --ignore-existing local/ecm-documents;
        mc mb --ignore-existing local/ecm-temp;
        mc mb --ignore-existing local/ecm-templates;
        mc mb --ignore-existing local/ecm-archive;
        echo 'Buckets ready';
        exit 0;
      "
    networks:
      - ecm-network

  # ─── RabbitMQ ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ecm-rabbitmq
    hostname: ecm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ecmrabbit
      RABBITMQ_DEFAULT_PASS: ecmrabbitpassword
      RABBITMQ_DEFAULT_VHOST: ecm
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ecm-network

  # ─── OpenSearch ───────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: ecm-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL",
             "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ecm-network
  # ─── Tesseract OCR (dev only) ─────────────────────────────────
  tesseract-ocr:
    image: hertzg/tesseract-server:latest
    container_name: ecm-tesseract
    ports:
      - "8884:3000"
    networks:
      - ecm-network
  # ─── pgAdmin ──────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecmapp.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecm-network

networks:
  ecm-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  opensearch_data:
  pgadmin_data: